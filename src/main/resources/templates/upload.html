<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка миссии — ТМК</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .navbar-custom {
            background-color: #1a1a2e;
            border-bottom: 2px solid #7b2fff;
        }
        .navbar-brand {
            color: #c084fc !important;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        .upload-card {
            background: #111122;
            border: 1px solid #7b2fff44;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 640px;
            margin: 3rem auto;
        }
        .upload-title {
            color: #c084fc;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }
        .form-label {
            color: #a78bfa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            background: #1a1a2e;
            border: 1px solid #7b2fff55;
            color: #e0e0e0;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: #1a1a2e;
            border-color: #7b2fff;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.2rem #7b2fff33;
        }
        .form-select option { background: #1a1a2e; }

        /* Зона перетаскивания файла */
        .drop-zone {
            border: 2px dashed #7b2fff66;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #0d0d1a;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #7b2fff;
            background: #1a1a2e;
        }
        .drop-zone i { font-size: 2.5rem; color: #7b2fff; }
        .drop-zone .drop-text { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }
        .drop-zone .file-name { color: #c084fc; font-weight: 600; margin-top: 0.5rem; }
        #fileInput { display: none; }

        /* Карточки форматов */
        .format-cards { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .format-card {
            flex: 1;
            min-width: 80px;
            border: 2px solid #7b2fff33;
            border-radius: 8px;
            padding: 0.6rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #1a1a2e;
            color: #888;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .format-card:hover { border-color: #7b2fff; color: #c084fc; }
        .format-card.selected { border-color: #7b2fff; background: #2d1b69; color: #c084fc; }
        .format-card i { display: block; font-size: 1.3rem; margin-bottom: 0.2rem; }

        .btn-submit {
            background: linear-gradient(135deg, #7b2fff, #9333ea);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; color: white; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-back {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-back:hover { color: #c084fc; }

        /* Блок подсказок по форматам */
        .hint-box {
            background: #0d0d1a;
            border: 1px solid #7b2fff22;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            font-size: 0.82rem;
            color: #666;
            margin-top: 1.5rem;
        }
        .hint-box .hint-title { color: #7b2fff; font-weight: 600; margin-bottom: 0.4rem; }
        .hint-code { font-family: monospace; color: #a78bfa; }

        .alert-flash { border-radius: 10px; border: none; }
        .divider { border-color: #7b2fff22; margin: 1.5rem 0; }
    </style>
</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-custom">
    <div class="container">
        <a href="/" class="navbar-brand">
            <i class="bi bi-archive-fill me-2"></i>АРХИВ МИССИЙ — ТМК
        </a>
    </div>
</nav>

<div class="container">
    <div class="upload-card">

        <!-- Заголовок -->
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="/" class="btn-back"><i class="bi bi-arrow-left"></i></a>
            <div>
                <div class="upload-title">
                    <i class="bi bi-cloud-upload me-2"></i>Загрузка миссии
                </div>
                <div class="text-secondary" style="font-size:0.85rem">
                    Добавить новую запись в архив
                </div>
            </div>
        </div>

        <!-- Flash-сообщения -->
        <div th:if="${successMessage}"
             class="alert alert-success alert-flash alert-dismissible fade show mb-3">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-danger alert-flash alert-dismissible fade show mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Форма загрузки -->
        <form method="post" action="/upload" enctype="multipart/form-data" id="uploadForm">

            <!-- Выбор формата -->
            <div class="mb-4">
                <label class="form-label">Формат файла</label>
                <div class="format-cards">
                    <div class="format-card" data-format="json" onclick="selectFormat('json')">
                        <i class="bi bi-filetype-json"></i>JSON
                    </div>
                    <div class="format-card" data-format="xml" onclick="selectFormat('xml')">
                        <i class="bi bi-filetype-xml"></i>XML
                    </div>
                    <div class="format-card" data-format="yaml" onclick="selectFormat('yaml')">
                        <i class="bi bi-file-code"></i>YAML
                    </div>
                    <div class="format-card" data-format="text" onclick="selectFormat('text')">
                        <i class="bi bi-filetype-txt"></i>TXT
                    </div>
                    <div class="format-card" data-format="pipe" onclick="selectFormat('pipe')">
                        <i class="bi bi-list-ul"></i>PIPE
                    </div>
                </div>
                <!-- Скрытое поле формата — заполняется JS -->
                <input type="hidden" name="format" id="formatInput" value="">
            </div>

            <hr class="divider">

            <!-- Зона загрузки файла -->
            <div class="mb-4">
                <label class="form-label">Файл миссии</label>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i class="bi bi-file-earmark-arrow-up"></i>
                    <div class="drop-text">Нажмите или перетащите файл сюда</div>
                    <div class="file-name" id="fileName" style="display:none"></div>
                </div>
                <input type="file" name="file" id="fileInput" accept=".json,.xml,.yaml,.yml,.txt,.log">
            </div>

            <!-- Кнопка отправки -->
            <button type="submit" class="btn btn-submit" id="submitBtn" disabled>
                <i class="bi bi-upload me-2"></i>Загрузить в архив
            </button>
        </form>

        <!-- Подсказки по форматам -->
        <div class="hint-box">
            <div class="hint-title"><i class="bi bi-info-circle me-1"></i>Поддерживаемые форматы</div>
            <div id="hintContent">Выберите формат файла выше, чтобы увидеть пример структуры.</div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Подсказки для каждого формата
    const hints = {
        json: `<span class="hint-code">{ "missionId": "M-2024-001", "date": "2024-10-12", "location": "Токио", "outcome": "SUCCESS", "curse": { "name": "...", "threatLevel": "HIGH" } }</span>`,
        xml:  `<span class="hint-code">&lt;mission&gt;&lt;missionId&gt;M-2024-001&lt;/missionId&gt;&lt;date&gt;2024-10-12&lt;/date&gt;&lt;outcome&gt;SUCCESS&lt;/outcome&gt;&lt;curse&gt;...&lt;/curse&gt;&lt;/mission&gt;</span>`,
        yaml: `<span class="hint-code">missionId: M-2024-001<br>date: 2024-10-12<br>outcome: SUCCESS<br>curse:<br>&nbsp;&nbsp;name: "..."<br>&nbsp;&nbsp;threatLevel: HIGH</span>`,
        text: `<span class="hint-code">[MISSION]<br>missionId=M-2024-001<br>date=2024-10-12<br>outcome=SUCCESS<br>[CURSE]<br>name=...<br>threatLevel=HIGH</span>`,
        pipe: `<span class="hint-code">MISSION_CREATED|M-2024-001|2024-10-12|Токио<br>CURSE_DETECTED|Название проклятия|HIGH<br>SORCERER_ASSIGNED|Имя|GRADE_1<br>MISSION_RESULT|SUCCESS|damageCost=1000000</span>`
    };

    // Выбор формата
    function selectFormat(format) {
        document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
        document.querySelector('[data-format="' + format + '"]').classList.add('selected');
        document.getElementById('formatInput').value = format;
        document.getElementById('hintContent').innerHTML = hints[format] || '';
        checkReady();
    }

    // Отображение имени выбранного файла
    document.getElementById('fileInput').addEventListener('change', function () {
        const name = this.files[0] ? this.files[0].name : null;
        const nameEl = document.getElementById('fileName');
        if (name) {
            nameEl.textContent = name;
            nameEl.style.display = 'block';
            document.querySelector('.drop-text').style.display = 'none';
        }
        checkReady();
    });

    // Drag & drop
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) {
            const dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById('fileInput').files = dt.files;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileName').style.display = 'block';
            document.querySelector('.drop-text').style.display = 'none';
            checkReady();
        }
    });

    // Активируем кнопку только если выбраны и файл, и формат
    function checkReady() {
        const hasFile   = document.getElementById('fileInput').files.length > 0;
        const hasFormat = document.getElementById('formatInput').value !== '';
        document.getElementById('submitBtn').disabled = !(hasFile && hasFormat);
    }
</script>
</body>
</html>
